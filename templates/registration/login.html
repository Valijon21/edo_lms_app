{% extends 'base.html' %}
{% block title %}Kirish{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-3">Kirish</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Kirish</button>
    </form>
    <p class="mt-3">
      <a href="{% url 'accounts:password_reset' %}">Parolni unutdingizmi?</a>
    </p>
    <p>Akkauntingiz yo'qmi? <a href="{% url 'accounts:register' %}">Ro'yxatdan o'tish</a></p>
  </div>
</div>
{% endblock %}
